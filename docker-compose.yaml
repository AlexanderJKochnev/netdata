services:
  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    restart: unless-stopped
    hostname: debian-server-monitor
    ports:
      - "19999:19999"
    environment:
      # Это заменяет правку netdata.conf вручную:
      - NETDATA_WEB_BIND_TO=*
      - NETDATA_WEB_ALLOW_CONNECTIONS_FROM=localhost *
      - NETDATA_WEB_ALLOW_DASHBOARD_FROM=localhost *
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # - /etc/os-release:/host/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./nginx.conf:/etc/netdata/go.d/nginx.conf:ro
      - /:/host/root:ro,rslave
      - /etc/localtime:/etc/localtime:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
    networks:
      - nginx_gateway_shared_network
volumes:
  netdataconfig:
  netdatalib:
  netdatacache:

networks:
  nginx_gateway_shared_network:
    driver: bridge
    external: true
