services:
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    restart: unless-stopped
    hostname: debian-server-monitor
    environment:
      - NETDATA_HOSTNAME=debian-server
      # Добавьте эту строку:
      - NETDATA_EXTRA_ARGS=-D
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NETDATA_EXTRA_ARGS=-D -W set global "bind to" "*"
    # ports:
    #   - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./config/netdata.conf:/etc/netdata/netdata.conf:ro
      # - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # - /etc/os-release:/host/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./nginx.conf:/etc/netdata/go.d/nginx.conf:ro
      - /:/host/root:ro,rslave
      - /etc/localtime:/etc/localtime:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/log/fail2ban.log:/var/log/fail2ban.log:ro
    networks:
      - nginx_gateway_shared_network
      - ollama_redis_network
      - prod_postgres_network
      - prod_pgbouncer_network
      - test_postgres_network
      - test_pgbouncer_network
      - test_redis_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu, utility ]
volumes:
  netdataconfig:
  netdatalib:
  netdatacache:

networks:
  nginx_gateway_shared_network:
    external: true
  ollama_redis_network:
    external: true
  prod_postgres_network:
    external: true
  prod_pgbouncer_network:
    external: true
  test_postgres_network:
    external: true
  test_pgbouncer_network:
    external: true
  test_redis_network:
    external: true