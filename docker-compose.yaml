services:
  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    pid: host
    ports:
      - "61208:61208"
    environment:
      - "GLANCES_OPT=-w"  # -w включает Web-интерфейс
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/host/etc/os-release:ro
    networks:
      - nginx_gateway_shared_network
      - ollama_redis_network
      - prod_postgres_network
      - prod_pgbouncer_network
      - test_postgres_network
      - test_pgbouncer_network
      - test_redis_network

networks:
  nginx_gateway_shared_network:
    external: true
  ollama_redis_network:
    external: true
  prod_postgres_network:
    external: true
  prod_pgbouncer_network:
    external: true
  test_postgres_network:
    external: true
  test_pgbouncer_network:
    external: true
  test_redis_network:
    external: true